name: GRGabriellaRomeo
options:
  bundleIdPrefix: com.grgabriellaromeo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  GRGabriellaRomeo:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: G-R Gabriella Romeo
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIAppFonts:
          - GRGabriellaFinal.ttf
          - GRGabriellaUltraCustom.ttf
          - GRGabriellaModern.ttf
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grgabriellaromeo.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M293D8XT82
